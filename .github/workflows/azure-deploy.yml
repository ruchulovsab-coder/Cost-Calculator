name: Deploy to Azure Container Apps

# Push-to-deploy. Authentication uses GitHub OIDC (federated identity) — there are
# NO secrets stored in this repo. The three values below are non-secret IDs set as
# GitHub Actions *Variables* (Settings > Secrets and variables > Actions > Variables).
# See DEPLOY.md for the one-time Azure setup.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

env:
  RESOURCE_GROUP: rg-ops-estimator
  LOCATION: centralindia
  CONTAINERAPP_ENV: env-ops-estimator
  CONTAINERAPP_NAME: nagarro-ops-estimator
  TARGET_PORT: "8000"
  # Run JS actions on Node 24 (silences the Node 20 deprecation warnings)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (runtime + test)
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest -q

  deploy:
    needs: test          # deploy only if tests pass
    runs-on: ubuntu-latest
    env:
      # Accept the IDs whether they were added under the Variables OR Secrets tab.
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      # Rate card in Azure Blob (non-secret; optional — leave empty to use manual upload)
      RATECARD_ACCOUNT_URL: ${{ vars.RATECARD_ACCOUNT_URL }}
      RATECARD_CONTAINER: ${{ vars.RATECARD_CONTAINER }}
      RATECARD_BLOB: ${{ vars.RATECARD_BLOB }}
      # Saved calculations store (non-secret; optional — leave empty to disable cloud save)
      ESTIMATES_ACCOUNT_URL: ${{ vars.ESTIMATES_ACCOUNT_URL }}
      ESTIMATES_CONTAINER: ${{ vars.ESTIMATES_CONTAINER }}
      # Public base URL of the app, used to build review links (e.g. https://...azurecontainerapps.io)
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      # Azure Communication Services Email (approval notifications) — optional.
      # Use EITHER ACS_CONNECTION_STRING (a Secret) OR ACS_ENDPOINT (managed identity).
      ACS_ENDPOINT: ${{ vars.ACS_ENDPOINT }}
      ACS_SENDER: ${{ vars.ACS_SENDER }}
      ACS_CONNECTION_STRING: ${{ secrets.ACS_CONNECTION_STRING }}
      # Conversational "Chat to estimate" (Groq, free tier) — optional.
      # Accept the key from Secrets (recommended — encrypted/masked) OR Variables.
      # GROQ_MODEL is an optional Variable (defaults to llama-3.3-70b-versatile in code).
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || vars.GROQ_API_KEY }}
      GROQ_MODEL: ${{ vars.GROQ_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Azure IDs are configured
        run: |
          missing=""
          [ -z "$AZURE_CLIENT_ID" ]       && missing="$missing AZURE_CLIENT_ID"
          [ -z "$AZURE_TENANT_ID" ]       && missing="$missing AZURE_TENANT_ID"
          [ -z "$AZURE_SUBSCRIPTION_ID" ] && missing="$missing AZURE_SUBSCRIPTION_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing Azure IDs:$missing — add as REPOSITORY variables at"
            echo "https://github.com/${{ github.repository }}/settings/variables/actions"
            exit 1
          fi
          echo "Azure IDs present."

      - name: Azure login (OIDC — no secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Build on runner, push to ACR, deploy to Container Apps
        run: |
          set -euo pipefail
          az extension add --name containerapp --upgrade --only-show-errors

          # Globally-unique but stable ACR name derived from the subscription id
          ACR="acr$(echo "$AZURE_SUBSCRIPTION_ID" | tr -d '-' | cut -c1-12)"
          IMAGE_TAG="${GITHUB_SHA::12}"

          az group create -n "$RESOURCE_GROUP" -l "$LOCATION" --only-show-errors >/dev/null

          # Azure Container Registry (admin enabled so we can push + ACA can pull
          # without extra role assignments). ACR Tasks is NOT used — we build locally.
          az acr show -n "$ACR" -g "$RESOURCE_GROUP" --only-show-errors >/dev/null 2>&1 || \
            az acr create -n "$ACR" -g "$RESOURCE_GROUP" --sku Basic --admin-enabled true --only-show-errors >/dev/null

          LOGIN_SERVER=$(az acr show -n "$ACR" -g "$RESOURCE_GROUP" --query loginServer -o tsv)
          ACR_USER=$(az acr credential show -n "$ACR" --query username -o tsv)
          ACR_PASS=$(az acr credential show -n "$ACR" --query "passwords[0].value" -o tsv)

          # Build & push the image on the GitHub runner (has Docker)
          echo "$ACR_PASS" | docker login "$LOGIN_SERVER" -u "$ACR_USER" --password-stdin
          docker build -t "$LOGIN_SERVER/cost-calculator:$IMAGE_TAG" .
          docker push "$LOGIN_SERVER/cost-calculator:$IMAGE_TAG"

          # Container Apps environment (create if missing)
          az containerapp env show -n "$CONTAINERAPP_ENV" -g "$RESOURCE_GROUP" --only-show-errors >/dev/null 2>&1 || \
            az containerapp env create -n "$CONTAINERAPP_ENV" -g "$RESOURCE_GROUP" -l "$LOCATION" --only-show-errors >/dev/null

          # Create or update the app
          if az containerapp show -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" --only-show-errors >/dev/null 2>&1; then
            az containerapp registry set -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
              --server "$LOGIN_SERVER" --username "$ACR_USER" --password "$ACR_PASS" --only-show-errors
            az containerapp update -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
              --image "$LOGIN_SERVER/cost-calculator:$IMAGE_TAG" --only-show-errors
          else
            az containerapp create -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
              --environment "$CONTAINERAPP_ENV" \
              --image "$LOGIN_SERVER/cost-calculator:$IMAGE_TAG" \
              --registry-server "$LOGIN_SERVER" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --target-port "$TARGET_PORT" --ingress external \
              --min-replicas 0 --max-replicas 1 --only-show-errors
          fi

          az containerapp ingress sticky-sessions set -n "$CONTAINERAPP_NAME" \
            -g "$RESOURCE_GROUP" --affinity sticky --only-show-errors || true

          # Enable system-assigned managed identity (idempotent) — used to read the
          # rate card from Blob Storage. Grant it 'Storage Blob Data Reader' once
          # (see DEPLOY.md); that role assignment requires Owner and is done manually.
          az containerapp identity assign -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
            --system-assigned --only-show-errors || true

          # Apply Blob config (rate card + estimates store) from repo Variables, if provided.
          ENVPAIRS=()
          [ -n "${RATECARD_ACCOUNT_URL:-}" ] && ENVPAIRS+=("RATECARD_ACCOUNT_URL=$RATECARD_ACCOUNT_URL" "RATECARD_CONTAINER=$RATECARD_CONTAINER" "RATECARD_BLOB=$RATECARD_BLOB")
          [ -n "${ESTIMATES_ACCOUNT_URL:-}" ] && ENVPAIRS+=("ESTIMATES_ACCOUNT_URL=$ESTIMATES_ACCOUNT_URL" "ESTIMATES_CONTAINER=$ESTIMATES_CONTAINER")
          [ -n "${APP_BASE_URL:-}" ] && ENVPAIRS+=("APP_BASE_URL=$APP_BASE_URL")
          [ -n "${ACS_SENDER:-}" ] && ENVPAIRS+=("ACS_SENDER=$ACS_SENDER")
          [ -n "${ACS_ENDPOINT:-}" ] && ENVPAIRS+=("ACS_ENDPOINT=$ACS_ENDPOINT")
          [ -n "${ACS_CONNECTION_STRING:-}" ] && ENVPAIRS+=("ACS_CONNECTION_STRING=$ACS_CONNECTION_STRING")
          [ -n "${GROQ_API_KEY:-}" ] && ENVPAIRS+=("GROQ_API_KEY=$GROQ_API_KEY")
          [ -n "${GROQ_MODEL:-}" ] && ENVPAIRS+=("GROQ_MODEL=$GROQ_MODEL")
          if [ ${#ENVPAIRS[@]} -gt 0 ]; then
            az containerapp update -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" --only-show-errors \
              --set-env-vars "${ENVPAIRS[@]}"
          fi

          echo "============================================"
          echo "App URL: https://$(az containerapp show -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)"
          echo "============================================"
