name: Deploy to Azure Container Apps

# Push-to-deploy. Authentication uses GitHub OIDC (federated identity) — there are
# NO secrets stored in this repo. The three values below are non-secret IDs set as
# GitHub Actions *Variables* (Settings > Secrets and variables > Actions > Variables).
# See DEPLOY.md for the one-time Azure setup.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

env:
  RESOURCE_GROUP: rg-ops-estimator
  LOCATION: centralindia
  CONTAINERAPP_ENV: env-ops-estimator
  CONTAINERAPP_NAME: nagarro-ops-estimator
  TARGET_PORT: "8000"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (runtime + test)
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest -q

  deploy:
    needs: test          # deploy only if tests pass
    runs-on: ubuntu-latest
    env:
      # Accept the IDs whether they were added under the Variables OR Secrets tab.
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Azure IDs are configured
        env:
          V_CLIENT: ${{ vars.AZURE_CLIENT_ID }}
          V_TENANT: ${{ vars.AZURE_TENANT_ID }}
          V_SUB: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          S_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          S_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          S_SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          echo "Character lengths the runner sees (a real GUID is 36; 0 means empty):"
          echo "  Variables tab -> CLIENT=${#V_CLIENT}  TENANT=${#V_TENANT}  SUB=${#V_SUB}"
          echo "  Secrets   tab -> CLIENT=${#S_CLIENT}  TENANT=${#S_TENANT}  SUB=${#S_SUB}"
          missing=""
          [ -z "$AZURE_CLIENT_ID" ]       && missing="$missing AZURE_CLIENT_ID"
          [ -z "$AZURE_TENANT_ID" ]       && missing="$missing AZURE_TENANT_ID"
          [ -z "$AZURE_SUBSCRIPTION_ID" ] && missing="$missing AZURE_SUBSCRIPTION_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing/empty Azure IDs:$missing"
            echo "Add them at: https://github.com/${{ github.repository }}/settings/variables/actions"
            echo "They must be REPOSITORY variables/secrets (not Environment-scoped)."
            exit 1
          fi
          echo "All three Azure IDs are present."

      - name: Azure login (OIDC — no secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Build image & deploy to Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            # Builds the image in Azure (no local Docker needed) and deploys it.
            az containerapp up \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$CONTAINERAPP_ENV" \
              --location "$LOCATION" \
              --source . \
              --ingress external \
              --target-port "$TARGET_PORT"
            # Scale to zero when idle; keep a single replica so a user's in-memory
            # Streamlit session is never split across replicas.
            az containerapp update \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --min-replicas 0 --max-replicas 1
            az containerapp ingress sticky-sessions set \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --affinity sticky
            echo "App URL:"
            az containerapp show -n "$CONTAINERAPP_NAME" -g "$RESOURCE_GROUP" \
              --query properties.configuration.ingress.fqdn -o tsv
